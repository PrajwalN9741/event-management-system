{% extends 'base.html' %}
{% block title %}Edit {{ item.name }} – EMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="bi bi-pencil-square me-2"></i>Edit Inventory Item</h1>
    <a href="{{ url_for('inventory.list_inventory') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-panel">
            <form method="POST" action="{{ url_for('inventory.edit_item', item_id=item.id) }}">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Item Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required value="{{ item.name }}" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Category</label>
                        <select name="category" class="form-select">
                            {% for c in categories %}
                            <option value="{{ c }}" {{ 'selected' if item.category==c else '' }}>{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Unit</label>
                        <select name="unit" class="form-select">
                            {% for u in units %}
                            <option value="{{ u }}" {{ 'selected' if item.unit==u else '' }}>{{ u }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Quantity</label>
                        <input type="number" name="quantity" class="form-control" min="0" step="0.01"
                            value="{{ item.quantity }}" />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Price / Unit (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" name="price_per_unit" class="form-control" min="0" step="0.01"
                                value="{{ item.price_per_unit }}" />
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Low Stock Threshold</label>
                        <input type="number" name="low_stock_threshold" class="form-control" min="0" step="0.01"
                            value="{{ item.low_stock_threshold }}" />
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>Save
                        Changes</button>
                    <a href="{{ url_for('inventory.list_inventory') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
